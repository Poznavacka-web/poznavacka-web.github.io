<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">Načítání...</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" id="style">
    <script src="./tools.js"></script>
    <script src="./settings.js"></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

</head>
<body>
    <header class="panel">
        <div class="container" id="cnt">
            <h2 id="title_h1" class="title">Počkejte prosím...</h2>
            <a href="./roky.html" class="button" id="zpet">Zpět</a>
            <br>
            <br>
            <br>
            <nav id="select" class="button-container">
                
                <div id="list_b">
                    <button type="button" id="b_odpovedi">Přírodniny</button>
                    <button type="button" id="b_trenazer">Trenažer (Psaní)</button>
                    <button type="button" id="b_choice">Trenažer (Vybíraní)</button>
                </div>
            </nav>
        </div>
    </header>
    <main class="container">
        <div id="content_b" class="hidden">
            <input type="button" value="Ověřit" id="Check" class="button">
        </div>
    </main>
    <script src="./year.js" id="script_year"></script>
    <div class="too_small" style=" padding: 10px; display: none">
  <p style="color: yellow; -webkit-text-stroke: 0.5px black; font-size: 115px;">Ale ne!</p>
  <p style="font-size: 50;color: magenta">vaše</p>
  <p style="color: rgb(0, 225, 255); font-size: 100px;">Obrazovka</p>
  <p style="color: red; font-size: 50px;">je moc malá</p>
  <p style="color: aqua; font-size: 25px;">na zobrazení obsahu!</p>
</div>
<script>
const tooSmall = document.querySelector('.too_small');
const contentR = document.querySelector('#content-roky');
const content = document.querySelector(".container");

function checkSize() {
    // Example: consider "too small" if width < 800p
    contentR.style.display = 'block';
    content.style.display = 'block';
    const isSquished = content.clientWidth < 800 || contentR.clientWidth < 800;
    contentR.style.display = 'block';
    content.style.display = 'block';
    if (isSquished) {
        tooSmall.style.display = 'block';
        contentR.style.display = 'none';
        content.style.display = 'none';
    } else {
        tooSmall.style.display = 'none';
        contentR.style.display = 'block';
        content.style.display = 'block';
    }
}

// Check on load
checkSize();

// Optional: Check on window resize
window.addEventListener('resize', checkSize);
</script>
</body>
</html>
