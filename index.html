<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./icon.png">
    <title>Poznávání přírodnin</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="./settings.js"></script>
    <script src="./translate.js">
        debugger
    </script>

</head>
<body>
    <div class="container text-center">
        <header>
            <h1 translation-key="content.main.name">Poznávání přírodnin</h1>
        </header>
        <main>
            <nav class="button-container">
                <a translation-key="content.github" href="https://jenikh.github.io/github/" target="_blank" rel="noopener noreferrer" class="button github-link" style="display: none;">
                    GitHub
                </a>
                <a href="./roky.html" class="button" translation-key="content.st.1">1. stupeň</a>
                <a href="./diky.html" class="button" translation-key="content.thanks">Poděkování a kontribuce</a>
            </nav>
        </main>
    </div>
    <div class="too_small" style=" padding: 10px; display: none">
  <p style="color: yellow; -webkit-text-stroke: 0.5px black; font-size: 115px;">Ale ne!</p>
  <p style="font-size: 50;color: magenta">vaše</p>
  <p style="color: rgb(0, 225, 255); font-size: 100px;">Obrazovka</p>
  <p style="color: red; font-size: 50px;">je moc malá</p>
  <p style="color: aqua; font-size: 25px;">na zobrazení obsahu!</p>
</div>
<script>
const tooSmall = document.querySelector('.too_small');
const contentR = document.querySelector('#content-roky');
const content = document.querySelector(".container");

function checkSize() {
    // Example: consider "too small" if width < 800p
    contentR.style.display = 'block';
    content.style.display = 'block';
    const isSquished = content.clientWidth < 800 || contentR.clientWidth < 800;
    contentR.style.display = 'block';
    content.style.display = 'block';
    if (isSquished) {
        tooSmall.style.display = 'block';
        contentR.style.display = 'none';
        content.style.display = 'none';
    } else {
        tooSmall.style.display = 'none';
        contentR.style.display = 'block';
        content.style.display = 'block';
    }
}

// Check on load
checkSize();

// Optional: Check on window resize
window.addEventListener('resize', checkSize);
</script>
</body>
</html>
